name: '🐞 Bug Report'
description: "Tell us about something that's not working the way we (probably) intend."
labels: ['React-Native', 'Bug']
body:
  - type: dropdown
    id: environment
    validations:
      required: true
    attributes:
      label: 'What React Native libraries do you use?'
      description: 'Select all options that describe your application.'
      multiple: true
      options:
        - 'React Native without Frameworks'
        - 'React Navigation'
        - 'Hermes'
        - 'RN New Architecture'
        - 'Expo Application Services (EAS)'
        - 'Expo (mobile only)'
        - 'Expo Web'
        - 'Expo Router'
        - 'React Native Web'
        - 'React Native Navigation by Wix'

  - type: dropdown
    id: sentry
    validations:
      required: true
    attributes:
      label: 'Are you using sentry.io or on-premise?'
      description: 'Select exactly one option.'
      options:
        - 'sentry.io (SaS)'
        - 'on-premise (Self-Hosted)'

  - type: dropdown
    id: other_error_monitoring
    validations:
      required: true
    attributes:
      label: 'Are you using any other error monitoring solution alongside Sentry?'
      description: 'Select exactly one option.'
      options:
        - "Yes"
        - "No"

  - type: input
    id: other_error_monitoring_name
    validations:
      required: false
    attributes:
      label: 'Other Error Monitoring Solution Name'
      description: "If you're using another error monitoring solution side-by-side, please enter the name of the other solution."

  - type: input
    id: version
    validations:
      required: true
    attributes:
      label: '@sentry/react-native SDK Version'
      description: 'If the issue started after the SDK upgrade, please input both old and new versions.'
      placeholder: '5.33.1 ← should look like this'

  - type: textarea
    id: doctor
    validations:
      required: true
    attributes:
      label: 'How does your development environment look like?'
      description:
        'Output of the command `npx react-native@latest info` or manully describe your development environment?'
      value: |-
        ````
        ⬇  Place the `npx react-native@latest info` output here. ⬇




        ````

  - type: textarea
    id: init
    validations:
      required: true
    attributes:
      label: 'Sentry.init()'
      description: 'Code snipped of Sentry initialization from your application.'
      value: |-
        ````js
        Sentry.init({
          dsn: 'https://...@sentry.io/...'
          // other options
        });
        ````

  - type: textarea
    id: repro
    validations:
      required: true
    attributes:
      label: 'Steps to Reproduce'
      description: "How can we see what you're seeing? Specific is terrific."
      placeholder: |-
        1. Build Android using `npx react-native run-android --mode Debug`
        2. Start Metro Dev server using `npx react-native start`
        3. Click on button executing `Sentry.capture(new Error("This is not captured :("))`

  - type: textarea
    id: expected
    validations:
      required: true
    attributes:
      label: 'Expected Result'

  - type: textarea
    id: actual
    validations:
      required: true
    attributes:
      label: 'Actual Result'
      description: 'JS Console? iOS Console? Logcat? Screenshots? Yes, please.'

  - type: markdown
    attributes:
      value: |-

        ## Thank you 🙏
        Check our [triage docs](https://open.sentry.io/triage/) for what to expect next.
