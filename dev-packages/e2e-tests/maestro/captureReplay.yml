appId: ${APP_ID}
jsEngine: graaljs
---
- runFlow:
    file: utils/launchTestAppClear.yml
    env:
      replaysOnErrorSampleRate: 1.0
- runFlow:
    file: utils/waitForReplayBuffer.yml
    when:
      platform: iOS
- tapOn: "Capture Exception"
- runFlow: utils/assertEventIdVisible.yml
- runFlow:
    file: utils/assertReplay.yml
    when:
      platform: iOS
