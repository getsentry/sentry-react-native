// Approach: predict bundle task names from variant name; defer lookup to afterEvaluate
// so all plugins' onVariants callbacks have run before we probe tasks.names.
// tasks.named() is used for a targeted lazy reference — no container iteration.
plugins.withId('com.android.application') {
    def androidComponents = extensions.getByName("androidComponents")
    androidComponents.onVariants(androidComponents.selector().all()) { v ->
        if (!v.name.toLowerCase().contains("debug")) {
            def variantCapitalized = v.name.substring(0, 1).toUpperCase() + v.name.substring(1)
            project.afterEvaluate {
                def sentryBundleTaskName = ["createBundle${variantCapitalized}JsAndAssets", "bundle${variantCapitalized}JsAndAssets"].find { tasks.names.contains(it) }
                if (sentryBundleTaskName == null) {
                    project.logger.warn(
                        "[sentry-afterEvaluate] No bundle task found for variant '${v.name}'.")
                    return
                }
                tasks.named(sentryBundleTaskName).configure { bundleTask ->
                    project.logger.lifecycle("[sentry-afterEvaluate] found bundle task: ${bundleTask.name}")
                }
            }
        }
    }
}
